<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Homestay | Welcome</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f5f0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #2c4a3e;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .badge {
            background-color: #e2ece9;
            color: #2c4a3e;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .btn {
            background-color: #2c4a3e;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #1f352c;
        }
        .footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="badge">🍃 Coming Soon</span>
        <h1>Our Cozy Homestay</h1>
        <p>We are currently crafting a beautiful digital space for our peaceful getaway. Soon you will be able to view rooms, check seasonal availability, and book your stay directly with us.</p>
        <a href="#" class="btn">Notify Me When Live</a>
        <div class="footer">
            Powered by Azure Kubernetes Service & ArgoCD GitOps
        </div>
    </div>

</body>
</html>
